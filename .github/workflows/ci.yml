name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    # Placeholder public env so `next build` and the smoke check never depend on
    # real secrets. These are non-sensitive NEXT_PUBLIC values used only in CI.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke check (/api/health)
        run: |
          npm run start -- --port 3000 &
          SERVER_PID=$!
          # Wait for the server to come up, then verify the health endpoint.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health | grep -q '"status":"ok"'; then
              echo "Health check passed."
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed: /api/health did not return status ok."
          kill $SERVER_PID 2>/dev/null || true
          exit 1
